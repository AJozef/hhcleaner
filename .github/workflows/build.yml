name: CI

# Тесты и линтер гоняются на каждый push в main и на PR.
# Сборка/релиз .exe — только на пуш тега вида v1.2.0 (git tag v1.2.0 && git push --tags),
# и лишь после зелёных тестов (job build зависит от job test).
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & lint (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 — нижняя граница requires-python; 3.11 — версия сборочного job ниже.
        python-version: ['3.9', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # Ставит пакет + dev-инструменты (pytest, pylint). Браузер Playwright НЕ
      # качаем: тесты работают на pure-логике без сети и реального Chromium.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      # Линтим ровно корневые модули пакета (как py-modules в pyproject).
      # shell: bash — чтобы glob *.py раскрывался предсказуемо на Windows-раннере.
      - name: Lint
        shell: bash
        run: pylint *.py

  build:
    name: Build hhcleaner.exe
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    # Нужно, чтобы action-gh-release мог создать релиз и залить .exe:
    # по умолчанию токен Actions read-only, и шаг релиза падал бы с 403.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Ставит пакет + его зависимости (включая playwright с node-драйвером) и PyInstaller.
      # Браузер НЕ качаем: вход идёт через системный Edge/Chrome, в .exe кладём только драйвер.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pyinstaller>=6.0"

      # Сборка одного самодостаточного hhcleaner.exe (параметры onefile/console — в spec).
      - name: Build hhcleaner.exe
        run: python -m PyInstaller hhcleaner.spec --distpath dist --workpath build --noconfirm

      # Дымовой тест: .exe хотя бы стартует и печатает версию.
      - name: Smoke-test .exe
        run: dist\hhcleaner.exe --version

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hhcleaner.exe
          name: "hhcleaner ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          $size = [math]::Round((Get-Item dist\hhcleaner.exe).Length / 1MB, 1)
          "### Build Successful" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "**Release:** ${{ github.ref_name }}" >> $env:GITHUB_STEP_SUMMARY
          "**Artifact:** dist/hhcleaner.exe ($size MB)" >> $env:GITHUB_STEP_SUMMARY
